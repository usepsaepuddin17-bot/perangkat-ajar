<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrasi Belajar Guru - SMAN 15</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #1e3a8a; --bg: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); padding: 30px 15px; }
        .card { background: white; max-width: 750px; margin: 0 auto 30px auto; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
        .input-group label { font-size: 13px; font-weight: 700; color: #334155; }
        .input-group input, .input-group select { padding: 10px 14px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; }
        .link-section { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .canvas-wrap { position: relative; width: 100%; height: 140px; background: white; border: 2px dashed #94a3b8; border-radius: 8px; }
        canvas { position: absolute; width:100%; height:100%; left:0; top:0; cursor: crosshair; }
        .btn-submit { background: var(--primary); color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        .history-card { background: white; max-width: 750px; margin: 0 auto; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .history-title { color: var(--primary); font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .history-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; }
        .badge { padding: 4px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; text-transform: uppercase; }
        .menunggu { background: #fef3c7; color: #d97706; }
        .disetujui { background: #dbeafe; color: #2563eb; }
        .terbit { background: #d1fae5; color: #059669; }
        
        .link-row { display: flex; align-items: center; justify-content: space-between; background: white; padding: 8px 12px; border-radius: 6px; border: 1px solid #edf2f7; font-size: 12px; margin-bottom: 5px; }
        .btn-edit { background: #e2e8f0; color: #475569; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-edit:hover { background: #cbd5e1; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>E-Administrasi Belajar Guru</h2>
        <p style="color: #64748b; font-size: 13px;">SMAN 15 Maluku Tengah</p>
    </div>

    <form id="formAdmin" onsubmit="kirimSemuaData(event)">
        <div class="grid-3">
            <div class="input-group">
                <label>Nama Lengkap Guru</label>
                <select id="namaGuru" onchange="cekRiwayatGuru()" required><option value="">Memuat nama...</option></select>
            </div>
            <div class="input-group">
                <label>Mata Pelajaran</label>
                <select id="mapel" required><option value="">Memuat mapel...</option></select>
            </div>
            <div class="input-group">
                <label>Kelas</label>
                <select id="kelas" required><option value="">Memuat kelas...</option></select>
            </div>
        </div>

        <div class="link-section">
            <h4 style="margin-bottom: 15px; color: var(--primary);"><i class="fa-solid fa-folder-open"></i> Input Link Google Doc Perangkat</h4>
            <div class="input-group"><label>1. Kalender Pendidikan</label><input type="url" id="link1" placeholder="https://docs.google.com/..." required></div>
            <div class="input-group"><label>2. Alokasi Minggu Efektif</label><input type="url" id="link2" placeholder="https://docs.google.com/..." required></div>
            <div class="input-group"><label>3. Jadwal Mengajar</label><input type="url" id="link3" placeholder="https://docs.google.com/..." required></div>
            <div class="input-group"><label>4. CP dan ATP</label><input type="url" id="link4" placeholder="https://docs.google.com/..." required></div>
            <div class="input-group"><label>5. Program Tahunan</label><input type="url" id="link5" placeholder="https://docs.google.com/..." required></div>
            <div class="input-group"><label>6. Program Semester</label><input type="url" id="link6" placeholder="https://docs.google.com/..." required></div>
            <div class="input-group"><label>7. RPP / Modul Ajar</label><input type="url" id="link7" placeholder="https://docs.google.com/..." required></div>
            <div class="input-group"><label>8. KKTP</label><input type="url" id="link8" placeholder="https://docs.google.com/..." required></div>
            <div class="input-group"><label>9. Kisi-Kisi Soal</label><input type="url" id="link9" placeholder="https://docs.google.com/..." required></div>
            <div class="input-group"><label>10. Jurnal Guru</label><input type="url" id="link10" placeholder="https://docs.google.com/..." required></div>
            <div class="input-group"><label>11. Daftar Nilai & Absensi</label><input type="url" id="link11" placeholder="https://docs.google.com/..." required></div>
        </div>

        <div class="input-group" style="margin-bottom: 25px;">
            <label>Tanda Tangan Guru Pengampu (Gores Layar)</label>
            <div class="canvas-wrap"><canvas id="canvasGuru"></canvas></div>
            <button type="button" style="background:#ef4444; color:white; border:none; padding:4px 8px; font-size:11px; border-radius:4px; margin-top:5px; width:80px;" onclick="hapusTTD()">Hapus TTD</button>
        </div>

        <button type="submit" class="btn-submit"><i class="fa-solid fa-cloud-arrow-up"></i> Kirim ke Kurikulum</button>
        <p id="loading" style="display:none; text-align:center; margin-top:10px; font-weight:bold; color:#2563eb;"><i class="fa-solid fa-spinner fa-spin"></i> Memproses data...</p>
    </form>
</div>

<div class="history-card">
    <h3 class="history-title"><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Pemasukan Berkas Anda</h3>
    <div id="statusMencari" style="font-size: 13px; color: #64748b; text-align:center; padding:10px;">Silakan pilih nama Anda untuk memuat riwayat berkas.</div>
    <div id="kontenRiwayat"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgSyvm6G-STS2t6KwoC0Z7tXu6Xfu8wAyE5FkJrQ475mPD3KPDklHjd7VWyjZsFMXQ/exec";
    const canvas = document.getElementById('canvasGuru');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let dataSeluruhGuru = [];

    function muatDropdown() {
        fetch(SCRIPT_URL).then(res => res.json()).then(res => {
            isiOpsi('namaGuru', res.guru, "Pilih Nama Anda");
            isiOpsi('mapel', res.mapel, "Pilih Mata Pelajaran");
            isiOpsi('kelas', res.kelas, "Pilih Kelas");
            ambilSemuaRiwayat();
        }).catch(() => alert("Gagal memuat data master dari Spreadsheet."));
    }

    function isiOpsi(idElemen, arrayData, placeholder) {
        let el = document.getElementById(idElemen);
        el.innerHTML = `<option value="">-- ${placeholder} --</option>`;
        arrayData.forEach(item => { el.innerHTML += `<option value="${item}">${item}</option>`; });
    }

    function ambilSemuaRiwayat() {
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "ambilSemuaData" }) })
        .then(res => res.json()).then(res => {
            if(res.status === "success") { dataSeluruhGuru = res.data; cekRiwayatGuru(); }
        });
    }

    function cekRiwayatGuru() {
        const namaDipilih = document.getElementById('namaGuru').value;
        const wadah = document.getElementById('kontenRiwayat');
        const info = document.getElementById('statusMencari');
        
        if(!namaDipilih) { wadah.innerHTML = ""; info.style.display = "block"; return; }
        info.style.display = "none";
        
        const berkasGuru = dataSeluruhGuru.filter(d => d.namaGuru.trim() === namaDipilih.trim());
        if(berkasGuru.length === 0) {
            wadah.innerHTML = "<p style='font-size:13px; color:#64748b; text-align:center; padding:15px;'>Anda belum memiliki riwayat pengiriman berkas.</p>";
            return;
        }

        let html = "";
        const namaPerangkat = [
            "1. Kalender Pendidikan", "2. Alokasi Minggu Efektif", "3. Jadwal Mengajar", 
            "4. CP dan ATP", "5. Program Tahunan", "6. Program Semester", 
            "7. RPP / Modul Ajar", "8. KKTP", "9. Kisi-Kisi Soal", 
            "10. Jurnal Guru", "11. Daftar Nilai & Absensi"
        ];

        berkasGuru.forEach(d => {
            let cls = d.status === "Diterbitkan" ? "terbit" : (d.status === "Disetujui Kurikulum" ? "disetujui" : "menunggu");
            html += `
                <div class="history-item" style="border-left: 5px solid ${d.status === 'Diterbitkan' ? '#10b981' : (d.status === 'Disetujui Kurikulum' ? '#3b82f6' : '#f59e0b')};">
                    <div class="history-header">
                        <div><strong>${d.mapel} (${d.kelas})</strong></div>
                        <div><span class="badge ${cls}">${d.status}</span></div>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 6px;">
            `;

            for(let i = 1; i <= 11; i++) {
                let urlLink = d["link" + i];
                let kolomKe = i + 4; // Kolom 5 di excel (E) adalah Link 1, dst.
                if(urlLink) {
                    html += `
                        <div class="link-row">
                            <span style="font-weight:600; color:#475569;">${namaPerangkat[i-1]}</span>
                            <div style="display:flex; gap:5px;">
                                <a href="${urlLink}" target="_blank" style="background:#3b82f6; color:white; padding:3px 8px; border-radius:4px; text-decoration:none; font-size:11px;"><i class="fa-solid fa-eye"></i> Cek</a>
                                <button type="button" class="btn-edit" onclick="aksiEditLink('${d.namaGuru}', ${d.idBaris}, ${kolomKe}, '${urlLink}')"><i class="fa-solid fa-pen"></i> Edit</button>
                            </div>
                        </div>
                    `;
                }
            }
            html += `</div></div>`;
        });
        wadah.innerHTML = html;
    }

    function aksiEditLink(nama, idBaris, kolomKe, urlLama) {
        let urlBaru = prompt("Masukkan Link Google Doc Baru untuk merevisi berkas ini:", urlLama);
        if(urlBaru && urlBaru.trim() !== "" && urlBaru !== urlLama) {
            document.getElementById('loading').style.display = 'block';
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "updateLinkSpesifik", namaGuru: nama, idBaris: idBaris, kolom: kolomKe, linkBaru: urlBaru })
            }).then(() => {
                alert("Tautan berkas sukses diperbarui!");
                ambilSemuaRiwayat();
                document.getElementById('loading').style.display = 'none';
            }).catch(() => { alert("Gagal mengupdate"); document.getElementById('loading').style.display = 'none'; });
        }
    }

    function initCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.strokeStyle = "#000000"; }
    window.addEventListener('resize', initCanvas); setTimeout(initCanvas, 500);
    canvas.addEventListener('touchstart', (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); });
    canvas.addEventListener('touchend', () => drawing = false);
    canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
    canvas.addEventListener('mousemove', (e) => { if(!drawing) return; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); });
    canvas.addEventListener('mouseup', () => drawing = false);
    function getPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top }; }
    function hapusTTD() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function kirimSemuaData(e) {
        e.preventDefault();
        document.getElementById('loading').style.display = 'block';
        const payload = {
            action: "kirimAdministrasi",
            namaGuru: document.getElementById('namaGuru').value,
            mapel: document.getElementById('mapel').value,
            kelas: document.getElementById('kelas').value,
            link1: document.getElementById('link1').value,
            link2: document.getElementById('link2').value,
            link3: document.getElementById('link3').value,
            link4: document.getElementById('link4').value,
            link5: document.getElementById('link5').value,
            link6: document.getElementById('link6').value,
            link7: document.getElementById('link7').value,
            link8: document.getElementById('link8').value,
            link9: document.getElementById('link9').value,
            link10: document.getElementById('link10').value,
            link11: document.getElementById('link11').value,
            ttdGuru: canvas.toDataURL()
        };
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
        .then(() => {
            alert("Seluruh Perangkat Administrasi Berhasil Dikirim!");
            document.getElementById('formAdmin').reset(); hapusTTD();
            ambilSemuaRiwayat();
            document.getElementById('loading').style.display = 'none';
        }).catch(() => { alert("Pengiriman gagal"); document.getElementById('loading').style.display = 'none'; });
    }
    window.onload = muatDropdown;
</script>
</body>
</html>
