<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer Administrasi Perangkat Guru</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-page: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --accent-color: #3a86ff;
            --accent-success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-page);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 20px;
            transition: color 0.3s;
            align-self: flex-start;
            max-width: 1200px;
            width: 100%;
        }

        .back-nav:hover {
            color: var(--text-main);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        /* PANEL FILTER KIRI */
        .filter-card {
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            height: fit-content;
        }

        .card-header {
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .card-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #38bdf8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .control-group label {
            font-size: 12px;
            font-weight: 600;
            color: #d1d5db;
        }

        .control-group select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #1e293b;
            color: white;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
            width: 100%;
            cursor: pointer;
        }

        .control-group select:focus {
            border-color: var(--accent-color);
        }

        /* GRID PANEL DOKUMEN */
        .panels-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .panel-btn {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px 10px;
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .panel-btn:hover:not(:disabled) {
            border-color: var(--accent-color);
            background: rgba(58, 134, 255, 0.1);
            transform: translateY(-2px);
        }

        .panel-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            border-color: #1e293b;
        }

        .panel-btn i {
            font-size: 16px;
            color: #38bdf8;
        }

        .panel-btn span {
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* AREA VIEWER KANAN */
        .viewer-card {
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            min-height: 650px;
        }

        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .viewer-title h3 {
            font-size: 16px;
            color: #fff;
        }
        .viewer-title p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .btn-external {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: none;
        }

        .frame-container {
            flex: 1;
            background: #0f172a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #334155;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .placeholder-text {
            color: var(--text-muted);
            text-align: center;
            font-size: 14px;
            padding: 20px;
        }

        /* ---- PERBAIKAN RESPONSIVE LAYOUT UNTUK HP DAN TABLET ---- */
        @media (max-width: 900px) {
            body {
                padding: 20px 12px;
            }
            
            .back-nav {
                margin-left: 4px;
            }

            .main-layout { 
                grid-template-columns: 1fr; /* Turun menjadi 1 kolom penuh */
                gap: 20px;
            }

            .filter-card {
                padding: 18px;
            }

            .viewer-card {
                padding: 18px;
                min-height: 520px; /* Sedikit diperpendek di HP agar pas */
            }

            .viewer-header {
                flex-direction: column; /* Judul dan tombol susun vertikal */
                align-items: flex-start;
                gap: 12px;
            }

            .btn-external {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .panels-grid { 
                grid-template-columns: 1fr; /* Di HP kecil tombol berbaris kebawah */
            }
        }
    </style>
</head>
<body>

    <a href="dashbor.html" class="back-nav">
        <i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard
    </a>

    <div class="main-layout">
        
        <div class="filter-card">
            <div class="card-header">
                <h2><i class="fa-solid fa-sliders"></i> Filter Perangkat</h2>
            </div>
            
            <div class="control-group">
                <label for="namaGuru">Nama Guru</label>
                <select id="namaGuru" onchange="ambilDataPerangkatGuru()" required>
                    <option value="" disabled selected>Memuat nama guru...</option>
                </select>
            </div>

            <div class="control-group">
                <label for="mataPelajaran">Mata Pelajaran</label>
                <select id="mataPelajaran" onchange="validasiKombinasiFilter()" disabled>
                    <option value="" disabled selected>Pilih Guru dahulu...</option>
                </select>
            </div>

            <div class="control-group">
                <label for="kelas">Kelas</label>
                <select id="kelas" onchange="validasiKombinasiFilter()" disabled>
                    <option value="" disabled selected>Pilih Guru dahulu...</option>
                </select>
            </div>

            <div class="card-header" style="margin-top: 25px; margin-bottom: 10px;">
                <h2><i class="fa-solid fa-folder-open"></i> Pilih Perangkat</h2>
            </div>

            <div class="panels-grid">
                <button class="panel-btn" onclick="tampilkanFile('link1')" disabled id="btn-link1">
                    <i class="fa-solid fa-calendar-days"></i> <span>1. Kaldik</span>
                </button>
                <button class="panel-btn" onclick="tampilkanFile('link2')" disabled id="btn-link2">
                    <i class="fa-solid fa-business-time"></i> <span>2. Minggu Efektif</span>
                </button>
                <button class="panel-btn" onclick="tampilkanFile('link3')" disabled id="btn-link3">
                    <i class="fa-solid fa-clock"></i> <span>3. Jadwal Mengajar</span>
                </button>
                <button class="panel-btn" onclick="tampilkanFile('link4')" disabled id="btn-link4">
                    <i class="fa-solid fa-route"></i> <span>4. CP & ATP</span>
                </button>
                <button class="panel-btn" onclick="tampilkanFile('link5')" disabled id="btn-link5">
                    <i class="fa-solid fa-calendar-check"></i> <span>5. Prota</span>
                </button>
                <button class="panel-btn" onclick="tampilkanFile('link6')" disabled id="btn-link6">
                    <i class="fa-solid fa-business-time"></i> <span>6. Prosem</span>
                </button>
                <button class="panel-btn" onclick="tampilkanFile('link7')" disabled id="btn-link7">
                    <i class="fa-solid fa-scroll"></i> <span>7. RPP / Modul</span>
                </button>
                <button class="panel-btn" onclick="tampilkanFile('link8')" disabled id="btn-link8">
                    <i class="fa-solid fa-check-double"></i> <span>8. KKTP</span>
                </button>
                <button class="panel-btn" onclick="tampilkanFile('link9')" disabled id="btn-link9">
                    <i class="fa-solid fa-file-lines"></i> <span>9. Kisi Soal</span>
                </button>
                <button class="panel-btn" onclick="tampilkanFile('link10')" disabled id="btn-link10">
                    <i class="fa-solid fa-book"></i> <span>10. Jurnal Guru</span>
                </button>
                <button class="panel-btn" onclick="tampilkanFile('link11')" disabled id="btn-link11">
                    <i class="fa-solid fa-list-check"></i> <span>11. Daftar Nilai</span>
                </button>
            </div>
        </div>

        <div class="viewer-card">
            <div class="viewer-header">
                <div class="viewer-title">
                    <h3 id="txtJudulDokumen">Pratinjau Dokumen</h3>
                    <p id="txtSubJudulDokumen">Silakan tentukan filter dan pilih panel perangkat administrasi.</p>
                </div>
                <a id="btnBukaEksternal" href="#" target="_blank" class="btn-external">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> Buka Tab Baru
                </a>
            </div>

            <div class="frame-container">
                <div id="loadingStatus" style="display: none; color: #3a86ff;">
                    <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
                </div>
                <div id="placeholderText" class="placeholder-text">
                    <i class="fa-solid fa-file-pdf fa-3x" style="color: #475569; margin-bottom: 10px;"></i>
                    <p>Tidak ada dokumen aktif yang sedang dibuka.</p>
                </div>
                <iframe id="pdfViewer" src=""></iframe>
            </div>
        </div>

    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgSyvm6G-STS2t6KwoC0Z7tXu6Xfu8wAyE5FkJrQ475mPD3KPDklHjd7VWyjZsFMXQ/exec";
        let masterGuru = [];
        let masterBerkas = [];
        let dataCocokDitemukan = null;

        const namaPerangkat = [
            "1. Kalender Pendidikan", "2. Alokasi Minggu Efektif", "3. Jadwal Mengajar", 
            "4. CP dan ATP", "5. Program Tahunan", "6. Program Semester", 
            "7. RPP / Modul Ajar", "8. KKTP", "9. Kisi-Kisi Soal", 
            "10. Jurnal Guru", "11. Daftar Nilai & Absensi"
        ];

        document.addEventListener("DOMContentLoaded", function() {
            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "ambilSemuaData" }) })
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    masterGuru = res.daftarGuru || [];
                    masterBerkas = res.dataBerkas || [];
                    
                    masterGuru.sort((a, b) => a.nama.localeCompare(b.nama));
                    
                    document.getElementById('namaGuru').innerHTML = '<option value="" disabled selected>-- Pilih Guru --</option>' + 
                        masterGuru.map(g => `<option value="${g.nama}">${g.nama}</option>`).join('');
                }
            }).catch(err => {
                console.error("Gagal load data database:", err);
                document.getElementById('namaGuru').innerHTML = '<option value="" disabled>Gagal terhubung server</option>';
            });
        });

        function ambilDataPerangkatGuru() {
            const guruDipilih = document.getElementById('namaGuru').value;
            const selectMapel = document.getElementById('mataPelajaran');
            const selectKelas = document.getElementById('kelas');
            
            resetViewer();
            nonaktifkanSemuaPanel();

            let berkasGuru = masterBerkas.filter(d => d.namaGuru === guruDipilih);
            let profilGuru = masterGuru.find(g => g.nama === guruDipilih) || {};

            if(berkasGuru.length > 0) {
                let mapelUnik = [...new Set(berkasGuru.map(r => r.mapel).filter(m => m))];
                let kelasUnik = [...new Set(berkasGuru.map(r => r.kelas).filter(k => k))];

                selectMapel.innerHTML = '<option value="" disabled selected>-- Pilih Mapel --</option>' + 
                    mapelUnik.map(m => `<option value="${m}">${m}</option>`).join('');
                
                selectKelas.innerHTML = '<option value="" disabled selected>-- Pilih Kelas --</option>' + 
                    kelasUnik.map(k => `<option value="${k}">${k}</option>`).join('');

                selectMapel.disabled = false;
                selectKelas.disabled = false;
            } else {
                selectMapel.innerHTML = `<option value="${profilGuru.mapel || '-'}">${profilGuru.mapel || '-'}</option>`;
                selectKelas.innerHTML = `<option value="${profilGuru.kelas || '-'}">${profilGuru.kelas || '-'}</option>`;
                selectMapel.disabled = true;
                selectKelas.disabled = true;
                alert("Guru yang bersangkutan terdaftar, namun belum mengumpulkan berkas perangkat apapun.");
            }
        }

        function validasiKombinasiFilter() {
            const guruDipilih = document.getElementById('namaGuru').value;
            const mapelDipilih = document.getElementById('mataPelajaran').value;
            const kelasDipilih = document.getElementById('kelas').value;

            if(!guruDipilih || !mapelDipilih || !kelasDipilih) return;

            const hasilCari = masterBerkas.find(r => r.namaGuru === guruDipilih && r.mapel === mapelDipilih && r.kelas === kelasDipilih);

            if(hasilCari) {
                dataCocokDitemukan = hasilCari;
                aktifkanPanelTersedia(hasilCari);
            } else {
                dataCocokDitemukan = null;
                nonaktifkanSemuaPanel();
            }
        }

        function aktifkanPanelTersedia(row) {
            for(let i = 1; i <= 11; i++) {
                const btn = document.getElementById(`btn-link${i}`);
                let urlLink = row["link" + i];
                
                if(urlLink && urlLink.toString().trim().startsWith('http') && !urlLink.toString().startsWith('DITOLAK:')) {
                    btn.disabled = false;
                } else {
                    btn.disabled = true;
                }
            }
        }

        function nonaktifkanSemuaPanel() {
            for(let i = 1; i <= 11; i++) {
                document.getElementById(`btn-link${i}`).disabled = true;
            }
        }

        function tampilkanFile(keyLink) {
            if(!dataCocokDitemukan) return;

            let urlAsli = dataCocokDitemukan[keyLink];
            if(!urlAsli) return;

            const iframe = document.getElementById('pdfViewer');
            const placeholder = document.getElementById('placeholderText');
            const loader = document.getElementById('loadingStatus');
            const btnExternal = document.getElementById('btnBukaEksternal');

            let indexNo = parseInt(keyLink.replace('link', '')) - 1;
            let teksJudul = namaPerangkat[indexNo];

            let urlEmbed = urlAsli;
            if (urlAsli.includes("drive.google.com/file/d/")) {
                let fileId = urlAsli.split("/file/d/")[1].split("/")[0];
                urlEmbed = `https://drive.google.com/file/d/${fileId}/preview`;
            } else if (urlAsli.includes("docs.google.com/document/d/")) {
                let docId = urlAsli.split("/document/d/")[1].split("/")[0];
                urlEmbed = `https://docs.google.com/document/d/${docId}/preview`;
            }

            document.getElementById('txtJudulDokumen').innerText = teksJudul;
            document.getElementById('txtSubJudulDokumen').innerText = `${dataCocokDitemukan.namaGuru} | ${dataCocokDitemukan.mapel} | ${dataCocokDitemukan.kelas}`;

            btnExternal.href = urlAsli;
            btnExternal.style.display = "block";

            placeholder.style.display = "none";
            iframe.style.display = "none";
            loader.style.display = "block";

            iframe.src = urlEmbed;
            iframe.onload = function() {
                loader.style.display = "none";
                iframe.style.display = "block";
            };
        }

        function resetViewer() {
            document.getElementById('pdfViewer').style.display = "none";
            document.getElementById('pdfViewer').src = "";
            document.getElementById('placeholderText').style.display = "block";
            document.getElementById('btnBukaEksternal').style.display = "none";
            document.getElementById('txtJudulDokumen').innerText = "Pratinjau Dokumen";
            document.getElementById('txtSubJudulDokumen').innerText = "Silakan tentukan filter dan pilih panel perangkat administrasi.";
        }
    </script>
</body>
</html>
